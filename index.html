<!DOCTYPE html>

    <style>

        .btn { padding: 18px 40px; border-radius: 15px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-main { background: white; color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .btn-sec { border: 2px solid white; color: white; }
        .btn:hover { transform: translateY(-5px); }
        footer { margin-top: 100px; padding: 40px; text-align: center; background: #064e3b; color: white; border-radius: 50px 50px 0 0; }
    </style>
</head>

            <div class="hero-btns">
